name: Update CRAN Archive

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      bootstrap:
        description: "Rebuild from scratch, ignoring the prior manifest."
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: cran-archive-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::RSQLite
            any::DBI
            any::jsonlite
            any::testthat
            any::withr
            any::digest
      - name: Run unit tests
        run: Rscript tests/testthat.R
      - name: Build archive database
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p out
          if [ "${{ inputs.bootstrap }}" = "true" ]; then
            Rscript scripts/update.R out/ --bootstrap
          else
            Rscript scripts/update.R out/
          fi
      - name: Publish to the "current" release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CHANGED=$(jq -r '.changed' out/manifest.json)
          if ! gh release view current >/dev/null 2>&1; then
            git tag -f current
            git push -f origin current || true
            gh release create current --title "CRAN Archive (rolling)" --notes "Rolling record of CRAN packages removed from the live listing, with archival dates." --latest
            CHANGED=true
          fi
          if [ "$CHANGED" = "true" ]; then
            gh release upload current out/cran-archive.db --clobber
            gh release upload current out/manifest.json --clobber
          fi
